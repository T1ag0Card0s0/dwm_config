backend = "glx";
vsync = true;
glx-copy-from-front = false;       # glx-no-stencil removed, this one is still valid

# ── Fading ───────────────────────────────────────────────────────────────────
fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 5;
no-fading-destroyed-argb = true;

# ── Shadows ──────────────────────────────────────────────────────────────────
shadow = true;
shadow-radius = 12;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.45;
shadow-color = "#1a1a2e";
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g = 'slop'",
    "_GTK_FRAME_EXTENTS@:c",
    "class_g = 'dwm'",
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

# ── Opacity ──────────────────────────────────────────────────────────────────
inactive-opacity = 0.90;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
opacity-rule = [
    "100:class_g = 'firefox'",
    "100:class_g = 'mpv'",
    "100:fullscreen"
];

# ── Blur ─────────────────────────────────────────────────────────────────────
blur: {
    method = "dual_kawase";
    strength = 6;
    background = true;
    background-frame = false;
    background-exclude = [
        "window_type = 'dock'",
        "window_type = 'desktop'",
        "_GTK_FRAME_EXTENTS@:c"
    ];
};

# ── Corners ──────────────────────────────────────────────────────────────────
corner-radius = 8;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'"
];

# ── Performance ──────────────────────────────────────────────────────────────
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;
use-damage = true;

# ── Window types ─────────────────────────────────────────────────────────────
wintypes: {
    tooltip      = { fade = true; shadow = false; opacity = 0.95; focus = true; };
    popup_menu   = { fade = true; shadow = true;  opacity = 1.0; };
    dropdown_menu = { fade = true; shadow = true; opacity = 1.0; };
    utility      = { shadow = false; };
    notification = { shadow = false; };
    dialog       = { shadow = true; };
    dock         = { shadow = false; blur-background = false; };
    dnd          = { shadow = false; };
};